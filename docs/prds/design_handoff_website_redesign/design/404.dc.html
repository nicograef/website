<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#2b45d8;--accent-hover:#1f36b8;--accent-ink:#2b45d8;--g2:color-mix(in oklab,var(--accent) 55%,#a855f7);--g3:color-mix(in oklab,var(--accent) 50%,#22d3ee);--bg:#f8f4ec;--card:#fffdf7;--text:#17150e;--muted:#5f5c4e;--faint:#8f8a76;--line:#e7e2d3;--line2:#ddd7c5;--btn-bg:#17150e;--btn-fg:#f8f4ec;--glow-o:1;--glow1:rgba(43,69,216,.10);--glow2:rgba(200,140,40,.12);}
[data-theme="dark"]{--accent-ink:#98a7ff;--bg:#14130c;--card:#1c1a11;--text:#f2eee0;--muted:#b8b3a0;--faint:#8c8874;--line:#2b281c;--line2:#3a3627;--btn-bg:#f2eee0;--btn-fg:#14130c;--glow1:rgba(105,130,255,.10);--glow2:rgba(220,160,60,.07);}
body{margin:0;background-color:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;transition:background-color .35s,color .35s;}
a{color:inherit;text-decoration:none;}
a:hover{color:inherit;}
@keyframes sheen{0%{background-position:-140% 0;}100%{background-position:240% 0;}}
@keyframes orb{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(14px,-18px) scale(1.06);}}
@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</helmet>

<div data-screen-label="404" style="min-height:100vh; display:flex; flex-direction:column;">
<div style="border-bottom:1px solid var(--line); transition:border-color .35s;">
  <header style="max-width:1160px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:22px 32px;">
    <a href="Startseite.dc.html" style="font-family:'Space Grotesk'; font-weight:700; font-size:19px;">nico gräf<span style="color:var(--accent-ink);">.</span></a>
    <nav style="display:flex; align-items:center; gap:28px; font-size:15px; font-weight:500; color:var(--muted);">
      <a href="Startseite.dc.html#portfolio" style-hover="color:var(--accent-ink);">Portfolio</a>
      <a href="Blog.dc.html" style-hover="color:var(--accent-ink);">Artikel</a>
      <a href="Lebenslauf.dc.html" style-hover="color:var(--accent-ink);">Lebenslauf</a>
      <button onClick="{{ toggleTheme }}" title="Theme wechseln" style="width:38px; height:38px; border:1px solid var(--line2); border-radius:11px; background:transparent; color:var(--text); font-size:15px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0;">{{ themeIcon }}</button>
      <a href="mailto:graef.nico@gmail.com" style="background:var(--btn-bg); color:var(--btn-fg); padding:10px 20px; border-radius:13px; font-weight:600; transition:background-color .35s,color .35s;" style-hover="opacity:.85;">Kontakt</a>
    </nav>
  </header>
</div>

<div style="position:relative; overflow:hidden; flex:1; display:flex; align-items:center; justify-content:center;">
  <div style="position:absolute; top:10%; left:15%; width:520px; height:420px; background:radial-gradient(circle, var(--glow1), transparent 70%); filter:blur(26px); pointer-events:none; opacity:var(--glow-o); animation:orb 9s ease-in-out infinite;"></div>
  <div style="position:absolute; bottom:5%; right:10%; width:460px; height:400px; background:radial-gradient(circle, var(--glow2), transparent 70%); filter:blur(26px); pointer-events:none; opacity:var(--glow-o); animation:orb 11s ease-in-out infinite reverse;"></div>
  <div style="position:relative; text-align:center; padding:80px 32px;">
    <div style="font-family:'Space Grotesk'; font-size:clamp(120px,20vw,220px); line-height:1; font-weight:700; letter-spacing:-0.04em; background:linear-gradient(100deg,var(--accent),var(--g2),var(--g3),var(--accent)); background-size:200% auto; -webkit-background-clip:text; background-clip:text; color:transparent; animation:sheen 6s linear infinite, rise .6s ease both;">404</div>
    <h1 style="font-family:'Space Grotesk'; font-size:28px; font-weight:700; margin:18px 0 12px; animation:rise .6s .08s ease both;">Diese Seite gibt es nicht.</h1>
    <p style="font-size:16.5px; line-height:1.65; color:var(--muted); margin:0 0 32px; animation:rise .6s .16s ease both;">Vielleicht ein alter Link — oder ein Tippfehler. Hier geht's zurück:</p>
    <div style="display:flex; gap:14px; justify-content:center; animation:rise .6s .24s ease both;">
      <a href="Startseite.dc.html" style="background:var(--accent); color:#fff; padding:14px 30px; border-radius:13px; font-weight:700; font-size:15px;" style-hover="background:var(--accent-hover);">Zur Startseite</a>
      <a href="Blog.dc.html" style="border:2px solid var(--line2); color:var(--text); padding:12px 28px; border-radius:13px; font-weight:700; font-size:15px;" style-hover="border-color:var(--accent-ink); color:var(--accent-ink);">Alle Artikel</a>
    </div>
  </div>
</div>

<div style="border-top:1px solid var(--line); transition:border-color .35s;">
  <footer style="max-width:1160px; margin:0 auto; padding:26px 32px; display:flex; justify-content:space-between; font-size:14px; color:var(--faint); width:100%; box-sizing:border-box;">
    <span>© 2026 Nico Gräf</span>
    <span style="display:flex; gap:20px;">
      <a href="https://github.com/nicograef" target="_blank" style-hover="color:var(--accent-ink);">GitHub</a>
      <a href="https://www.linkedin.com/in/nicograef" target="_blank" style-hover="color:var(--accent-ink);">LinkedIn</a>
      <a href="mailto:graef.nico@gmail.com" style-hover="color:var(--accent-ink);">E-Mail</a>
    </span>
  </footer>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { dark: false };
  componentDidMount() {
    const dark = localStorage.getItem('ng-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    this.setState({ dark });
  }
  renderVals() {
    const toggleTheme = () => {
      const dark = !this.state.dark;
      localStorage.setItem('ng-theme', dark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      this.setState({ dark });
    };
    return { themeIcon: this.state.dark ? '☀' : '☾', toggleTheme };
  }
}
</script>
</body>
</html>
