name: Deploy website

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: none

      - name: Lint PHP files
        run: |
          find public router.php -name '*.php' -not -path 'public/vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l
          echo "All PHP files pass syntax check on PHP 7.4"

      - name: Cache PHPStan
        uses: actions/cache@v4
        with:
          path: phpstan.phar
          key: phpstan-2.1.17

      - name: Download PHPStan
        run: |
          if [[ ! -f phpstan.phar ]]; then
            wget -q https://github.com/phpstan/phpstan/releases/download/2.1.17/phpstan.phar
            chmod +x phpstan.phar
          fi

      - name: Run PHPStan
        run: php phpstan.phar analyse --no-progress

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy
        run: |
          sshpass -p '${{ secrets.FTP_PASSWORD }}' rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./public/ ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:/home/www/nicograef.de/
